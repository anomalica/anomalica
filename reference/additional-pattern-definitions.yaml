  - name: uap-cabal-suppression  # 5 claims
    display_name: Alleged organised suppression of UAP information
    category: procedural
    definition: >
      Allegations of a coordinated, transnational network of actors - across intelligence agencies, defence contractors, and
      industrial interests - working to suppress public knowledge of UAP through classification, intimidation, disinformation,
      and control of the chain of custody for evidence. The pattern is the assertion of *coordination*, distinguishing this
      from individual instances of [[witness-intimidation-after-anomalous-events]] or [[shifting-official-accounts]].
    inclusion_criteria:
      - Claim asserts a coordinated suppressive entity (named or unnamed) acting across multiple incidents.
      - Source describes specific suppressive mechanisms (gag orders, intimidation, evidence interception).
      - Distinct from claims about a single agency's classification practice - those are administrative facts about that agency.
    exclusion_criteria:
      - Individual cover-up incidents (those instantiate the intimidation or shifting-accounts seed patterns).
      - Speculation about cabals without evidentiary basis in the corpus.
    suggested_match_keywords:
      - cabal
      - coordinated suppression
      - shadow programme
      - cartel
      - inner ring
      - control group
      - usurpation
      - secret syndicate

