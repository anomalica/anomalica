      - amendment to NDAA
      - whistleblower protections

  - name: chupa-chupa-phenomenon  # 5 claims
    display_name: Chupa-Chupa Amazonian UAP encounters
    category: behavioural
    definition: >
      A cluster of UAP encounters reported in the Brazilian Amazon basin (particularly Pará state) from the 1970s onward in
      which luminous airborne objects directed beams at human targets, causing reported burns, puncture wounds, and in some
      cases death. The pattern is the consistency of the targeting behaviour and resulting injury profile across multiple
      villages and years, investigated by the Brazilian Air Force.
    inclusion_criteria:
      - Encounter occurs in the documented Chupa-Chupa region or period.
      - Object exhibits beam-projection behaviour.
      - Human injuries follow with documented medical examination.
    exclusion_criteria:
      - General Brazilian UFO sightings without the beam-projection behaviour.
    suggested_match_keywords:
