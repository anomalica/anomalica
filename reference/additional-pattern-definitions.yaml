  - name: uap-disinformation-campaign  # 1 claim
    display_name: Alleged active disinformation campaigns targeting UAP discourse
    category: procedural
    definition: >
      Allegations of deliberate, active production and seeding of false UAP narratives by intelligence or defence actors to
      contaminate the public information environment around real UAP cases. Distinct from [[shifting-official-accounts]] (which
      is reactive public-record revision) in that disinformation is proactive - false narratives planted to mislead.
