  # === RECLASSIFIED EXISTING (heavy claim base, need precise definitions) ===

  - name: non-human-craft-recovery-programs  # 76 claims
    display_name: Non-human craft recovery programmes
    category: procedural
    definition: >
      Alleged classified programmes operated by national governments or their contractors to recover, exploit, and reverse-engineer
      non-human craft and associated materials. The pattern is the recurring testimony - across multiple independent claimants
      over decades - that such programmes exist, are compartmented at Special Access Program levels, and are not acknowledged
      through ordinary congressional oversight.
    inclusion_criteria:
      - Claim asserts the existence (current or historical) of a recovery, exploitation, or reverse-engineering programme
        for non-human craft or materials.
      - Claim is sourced to a named witness whose role would have plausibly exposed them to such a programme, or to documentary
        evidence (FOIA, declassified record, formal testimony).
      - Claim describes structural features of the programme (compartmentation, contractor involvement, denial routine) rather
        than abstract speculation.
    exclusion_criteria:
      - General speculation about hypothetical reverse-engineering without any attribution to a specific programme, contractor,
        or witness.
      - Claims about acknowledged conventional programmes (Project Blue Book, AATIP/AAWSAP) - those are programmes/investigations
        in their own right, not instances of this pattern.
    suggested_match_keywords:
      - crash retrieval
      - reverse engineering
      - recovered craft
      - recovered materials
      - non-human craft
      - non-human biologics
      - Special Access Program
      - SAP
      - controlled access programme
      - legacy programme
      - Wright-Patterson
      - exploitation programme

  - name: uap-biological-effects  # 46 claims
    display_name: Biological effects on UAP witnesses
    category: phenomenal
    definition: >
      Reports of physiological harm, injury, or biological anomaly in humans who were in close proximity to UAP. Effects range
      from acute (burns, radiation symptoms, paralysis, time loss) to chronic (long-term illness, neurological change, immune
      dysfunction). The pattern is the recurrence of similar effect profiles across independent witnesses, encounters, and
      decades.
    inclusion_criteria:
      - Claim describes a physical or biological effect on a named witness or witness group attributable to UAP proximity.
      - The effect is described in physiological terms (specific symptoms, medical findings) rather than purely psychological
        or emotional.
      - The temporal sequence (encounter then effect) is documented.
    exclusion_criteria:
      - Witness emotional reactions (fear, awe) without physical effect.
      - Indirect or socially-mediated effects (career consequences, ridicule, harassment) - those are instances of [[witness-intimidation-after-anomalous-events]]
        not biological effects.
    suggested_match_keywords:
      - burns
      - radiation exposure
      - radiation symptoms
      - illness following encounter
      - paralysis
      - missing time
      - time loss
      - immune dysfunction
      - hospitalised after sighting
      - sixth observable
      - implant
      - physical effects

  # === HIGH-CLAIM NET-NEW PATTERNS ===

  - name: uap-alien-implants  # 17 claims
    display_name: Alleged anomalous implants in UAP experiencers
    category: phenomenal
    definition: >
      Reports of small physical artefacts surgically extracted from individuals who claim UAP encounter histories, where the
      artefact has unusual material properties, anomalous manufacture, or no plausible mundane origin. The pattern is the
      consistency of recovered-object characteristics across independent extractions performed by different surgeons.
    inclusion_criteria:
      - Claim describes a physical object extracted from a named individual.
      - The individual has a UAP-encounter history relevant to the extraction context.
      - Material analysis or extraction circumstances are documented (surgeon notes, lab results, photographs).
    exclusion_criteria:
      - Claims of "implants" without physical extraction or only through hypnosis-recovered memory.
      - Ordinary medical hardware (surgical clips, dental work) found post-hoc and attributed to UAP origin without distinguishing
        evidence.
    suggested_match_keywords:
      - implant
      - implant removal
      - surgical extraction
      - anomalous object
      - Roger Leir
      - metallurgical analysis
      - foreign body
      - encounter implant

  - name: us-cattle-mutilation-cases  # 13 claims
    display_name: US cattle mutilation cases
    category: phenomenal
    definition: >
      Cattle and livestock found dead with characteristic injury patterns - precision incisions, organ removal without blood
      spill, drained blood, no tracks - across multiple US states and decades. The pattern is the consistency of the injury
      profile across independent investigations and the absence of identified perpetrators or natural-cause explanations sufficient
      to account for the case load.
    inclusion_criteria:
      - Case involves a livestock death with documented injury features matching the established cattle-mutilation profile.
      - Investigated by law enforcement, FBI, or ranchers' association contemporaneously.
      - Geographic and temporal context recorded.
    exclusion_criteria:
      - Routine predator kills without the characteristic precision injuries.
      - Anecdotal claims without contemporaneous investigation or photographic documentation.
    suggested_match_keywords:
      - cattle mutilation
      - livestock mutilation
      - precision incision
      - organ removal
      - bloodless wound
      - FBI cattle investigation
      - Cook cattle
      - Skinwalker Ranch livestock

  - name: uap-legacy-programmes  # 11 claims, was "UAP Legacy Programs"
    display_name: Claimed historical UAP recovery and exploitation lineage
    category: procedural
    definition: >
      Allegations that a continuous, multi-decade lineage of classified US programmes has handled non-human craft and materials
      since at least the 1940s, passed between contractors and agencies as successor programmes inherited the work of cancelled
      predecessors. The pattern is the assertion of *continuity* across the corpus, not any single named programme.
    inclusion_criteria:
      - Claim asserts continuity or succession between named or unnamed programmes over time.
      - Source describes the lineage as a feature (programmes hidden from oversight, transferred between contractors, renamed
        to evade disclosure).
      - Distinct from claims about a single named programme - those attach to that programme's own node.
    exclusion_criteria:
      - Claims about individual programmes in isolation (those are instances of [[non-human-craft-recovery-programs]] but
        only at the single-programme level).
    suggested_match_keywords:
      - decades-long programme
      - legacy programme
      - eighty-year programme
      - sub-rosa
      - continuous programme
      - successor programme
      - hidden lineage
      - programme inheritance

  - name: elizondo-home-orb-sightings  # 10 claims
    display_name: Orb sightings reported around the Elizondo home
    category: behavioural
    definition: >
      Reports of small luminous orbs observed by Luis Elizondo and his family at their residences across multiple US states
      from approximately the time of his departure from the Pentagon (2017) onwards. The pattern is the recurrence of the
      same observation profile across multiple residences and witnesses within the family unit.
    inclusion_criteria:
      - Claim describes an orb observation at an Elizondo family residence.
      - Observer is a named member of the Elizondo household or named visitor.
      - Date and residence context recorded.
    exclusion_criteria:
      - General orb sighting claims unconnected to the Elizondo residences.
    suggested_match_keywords:
      - orb at home
      - orb in yard
      - Elizondo residence
      - Jennifer Elizondo
      - orb encounter
      - small luminous object
      - household sighting

  - name: virginia-beach-uap-sightings  # 9 claims
    display_name: Recurring UAP sightings near Virginia Beach
    category: behavioural
    definition: >
      Recurring UAP observations by US Navy F/A-18 squadrons operating out of Naval Air Station Oceana over restricted airspace
      south-east of Virginia Beach, from approximately 2014 through the late 2010s. The pattern is the daily / near-daily
      nature of the sightings, the multi-sensor confirmation (radar and infrared simultaneously), and the persistence of the
      phenomenon at the same training airspace across years.
    inclusion_criteria:
      - Claim references the Virginia Beach / VACAPES operating area airspace or VFA squadron sightings from that region.
      - Observation is recorded by Navy aircrew or aircraft sensors.
      - Falls in the documented 2014-2019 active period.
    exclusion_criteria:
      - Unconnected Atlantic seaboard sightings (those are separate events or fit other patterns).
    suggested_match_keywords:
      - Virginia Beach UAP
      - VACAPES
      - Oceana NAS
      - Ryan Graves squadron
