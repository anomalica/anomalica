  - name: uap-disclosure-congressional-campaign  # 6 claims
    display_name: UAP disclosure congressional campaign
    category: procedural
    definition: >
      The sustained, multi-actor advocacy effort to compel US congressional UAP disclosure through repeated public testimony,
      legislative provisions (NDAA amendments), media engagement, and direct outreach to elected representatives from approximately
      2017 onwards. The pattern is the coordinated and recurring shape of the advocacy across named figures (Elizondo, Mellon,
      Grusch, Coulthart, others), legislative cycles, and media moments.
    inclusion_criteria:
      - Claim describes a discrete advocacy action (testimony, legislative drafting, journalism contribution, public appearance)
        directed at compelling disclosure.
      - Actor is identified.
      - Action contributes to the sustained campaign rather than being a one-off statement.
    exclusion_criteria:
      - Routine media commentary about UAP that does not call for disclosure.
      - Claims about specific disclosure investigations (those attach to the investigation node).
    suggested_match_keywords:
