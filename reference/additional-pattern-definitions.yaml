      The claim, popularised by Jay Stratton and James Lacatski in the context of Skinwalker Ranch fieldwork, that paranormal
      phenomena observed at an investigative site can subsequently manifest at the residences and workplaces of investigators
      who visited the site - as though attaching to and travelling with the investigator. The pattern is the recurrence of
      this attachment claim across multiple investigators reporting similar domestic phenomena post-site-visit.
    inclusion_criteria:
