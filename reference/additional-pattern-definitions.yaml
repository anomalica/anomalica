      - GO FAST
      - east coast sightings

  - name: foo-fighters-wwii-sightings  # 8 claims
    display_name: Foo fighter sightings by WWII aircrew
    category: morphological
    definition: >
      Reports by Allied and Axis aircrew during the Second World War of small luminous objects (orange / silver / metallic
      balls) that paced or surrounded combat aircraft in flight without apparent hostile action. The pattern is the consistency
      of the observation profile across both Allied and Axis pilots, multiple theatres, and the absence of an established
      explanation in the contemporary record.
    inclusion_criteria:
      - Sighting occurs during a WWII combat or transit flight.
      - Object is luminous or metallic, small, and paces or accompanies the aircraft.
      - Aircrew testimony is documented (debrief, mission report, post-war memoir, intelligence summary).
    exclusion_criteria:
      - General WWII UFO claims that do not involve in-flight pacing encounters with aircrew witnesses.
    suggested_match_keywords:
