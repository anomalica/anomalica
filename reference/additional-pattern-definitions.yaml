# Second batch of pattern definitions for the patterns that arrived
# through the matter triage (apply pass, 2026-05-24) without definitions
# attached. The 4 manual seeds and the 2 reclassified existing patterns
# (Non-Human Craft Recovery Programs, UAP Biological Effects) need
# definitions too - the latter pair were reclassified directly from
# matter type without going through the seed-definition flow.
#
# Format: same shape as initial-pattern-definitions.yaml. Definitions
# are written to match the existing claim corpus where claims are
# already attached, and are deliberately broad-but-bounded where claim
# counts are low. The per-claim pattern tagging pass will populate
# supporting_cases through embedding similarity + LLM adjudication, so
# this file does not enumerate them.
#
# Three patterns are flagged as MERGE candidates and carry no definition
# of their own - they should be retired and their claims re-pointed to
# the canonical seed pattern named in the merge_into field.

schema: anomalica/pattern-seed/1
created_at: '2026-05-24'
created_by: site (Claude, batch 2 after matter triage)

