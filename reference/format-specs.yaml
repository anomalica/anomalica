# Canonical document-format specification (machine-readable single source of truth)
#
# Every Anomalica document type's header/frontmatter fields and the hash chain that
# links them, in one place. Consumers (the site's architecture page, tooling) read THIS
# file directly and must not hand-copy these fields elsewhere - that is the duplication
# this file exists to prevent. The prose companions under architecture/ (record-format.md,
# digest-format.md, brief-format.md, content-format.md) carry the narrative (body grammar,
# parser behaviour, examples); the field list is canonical here.
#
# HARD RULE: no cost/billing/dollar fields appear in any document or in this file. Per-call
# AI usage is provenance only (model, version, token counts). Any notional cost a consumer
# wants to show is derived by that consumer from published list prices, never stored here.
# Enforced 2026-07-23: producers were emitting notional_cost_usd + price_basis in violation
# (59 digests, 53 articles; content/ feeds the public site). Both dropped at the producer,
# no bulk rewrite - they clear as artefacts regenerate, so pre-2026-07-23 files may carry
# them. The spec was always right here; the emitters drifted. See 0037 (amended) and
# digest-format.md#ai_usage. Nothing is lost by deriving: extracted_at dates the run, so
# the applicable price era stays recoverable without a stored basis.
#
# spec_version is this file's own version; each type's `schema` is the document schema it
# describes. `status: stable` = grounded in a ratified spec doc; `status: provisional` =
# the underlying design is not yet settled (do not treat as final).

spec_version: 1

types:

  ingest:
    schema: anomalica/record/1
    status: stable
    serialisation: markdown + YAML frontmatter
    spec_doc: architecture/record-format.md
    summary: One file per ingested source - the interchange between the ingester and the digester.
    source_types: [pdf, audio, video, web, ebook]
    # `formats` on a field lists the source_types it applies to, ONLY where the spec states
    # it. A field with no `formats` key applies to all source_types (or is reviewer-optional).
    fields:
      - {name: schema, type: string, required: true, description: "Format version. `anomalica/record/1`, or `anomalica/record/2`
          when word-level timestamps are present."}
      - {name: title, type: string, required: true, description: "Document or episode title. Always quoted. Lives only in
          frontmatter, never injected into the body."}
      - {name: source_type, type: string, required: true, description: "One of pdf, audio, video, web, ebook."}
      - {name: word_timestamps, type: boolean, required: false, description: "Present and true on `anomalica/record/2` transcripts
          that carry per-word `{{t:}}` markers."}
      - {name: provenance, type: object, required: true, description: "Canonical source-origin block (decision 0043; narrative
          + example in record-format.md). Sub-fields, each OMITTED when absent (never null): collection (curated grouping,
          e.g. 'war.gov UFO reading room'); publisher (issuing body / channel / author-org, not the hosting platform); creators
          (human author(s)/host(s), person names in natural order); published_date (the SOURCE's own publication/upload date,
          ISO 8601, may be partial - omitted when genuinely undated); acquired_date (when we brought it in, ISO 8601 datetime);
          source_url (canonical URL of the original); fetched_url (URL actually retrieved when different, e.g. a Wayback archive);
          source_file (original filename for a source ingested from a local file); identifiers (native ids keyed by scheme:
          youtube, virin, isbn, doi, ...); description (the source's OWN blurb, verbatim, never AI - omitted or truncated
          for licensed/restricted sources per copyright.status). SOURCE facts only - a subject's incident place and date are
          claims, not provenance. Copyright is NOT mirrored here; the authoritative field is the top-level `copyright`. Origin-unknown
          is simply the absence of source_url/fetched_url/source_file/identifiers."}
      - {name: content_hash, type: string, required: false, description: "SHA-256 naming the record's file in store/. Hashes
          source bytes for audio/video/pdf, extracted body text for web/ebook. See hashes below."}
      - {name: archived_ext, type: string, required: false, description: "Extension of this record's archived original, bare
          and without a dot (opus, ogg, pdf, epub, html). The archived object is sources/{content_hash}.{archived_ext} - the
          key consumers build to fetch or play the source. NOT DERIVABLE from any other field, and must never be re-derived
          from `container`: codec/container describe the STREAM, the extension is a property of the FILE. yt-dlp writes .opus
          while reporting container: ogg; a download named .ogg reports an identical stream - so 76 of 122 records had container:
          ogg against a .opus file, and a container-derived URL 404s for the majority. DISTINCT from source_file (the ORIGINAL
          filename of a local-file ingest): a video archived audio-only legitimately shows source_file: interview.mkv with
          archived_ext: opus. Do not reconcile the two - they describe different files."}
      - {name: source_hash, type: string, required: false, formats: [web, ebook], description: "SHA-256 of the raw source
          asset (post-render HTML for web, EPUB bytes for ebook), locating sources/{source_hash}.{ext}. Not emitted for audio/video/pdf
          (their content_hash already hashes the source bytes)."}
      - {name: snapshots, type: list, required: false, formats: [web], description: "Sibling capture artefacts. Each: role
          (page_render | single_file), hash (sha256 of bytes), content_type (MIME). Exposes PDF renders and frozen-page captures
          for web records."}
      - {name: pages, type: integer, required: false, formats: [pdf], description: "Page count for documents."}
      - {name: duration, type: number, required: false, formats: [audio, video], description: "Length of the FILE in seconds,
          measured from the archived original - NOT the transcript's span. A file ending in silence or outro music runs on
          past its last word; writing the last segment's end here understated every record in the corpus by up to 82s."}
      - {name: date_extracted, type: string, required: false, description: "When the ingestion pipeline ran. ISO 8601 with
          timezone (Zulu)."}
      - {name: copyright, type: object, required: false, description: "Copyright status object (see source-types-and-copyright
          draft). status is one of public_domain, open_licence, publicly_accessible, licensed, restricted. Only public_domain
          and open_licence serve the ORIGINAL file openly; the rest gate it behind proof of possession. DEFAULTS BY ACQUISITION
          (most specific wins, narrative in record-format.md): an explicit --copyright > a .gov/.mil URL -> public_domain
          (US government works carry no copyright, 17 USC 105 - gating one hides a public document for no benefit; match the
          HOSTNAME, never the string, or 'example.com/fake.gov/x.pdf' opens copyrighted material) > any other http(s) URL
          -> publicly_accessible (retrieving it anonymously PROVES public accessibility; the original still stays gated, the
          extracted text is surfaced) > a local file -> restricted (unknown provenance, fail closed). These are defaults a
          reviewer can override, not licence determinations; widening one (gated -> open) is irreversible once served and
          is a human decision, never an automated upgrade."}
      - {name: classification, type: string, required: false, formats: [pdf], description: "Original security classification
          banner, verbatim with parentheses stripped (e.g. SECRET//REL TO USA, FVEY). Present only for documents carrying
          a marking."}
      - {name: processing, type: object, required: false, description: "Processing metadata: handler, version (git short-hash),
          pipeline_version (monotonic per-media-type extraction generation; see 0040), tools used, source characteristics."}
      - {name: supersedes, type: string, required: false, description: "content_hash of the prior record this one retired,
          when a re-ingest of the same logical source (its `provenance.source_url` / `provenance.identifiers`) superseded
          an earlier extraction. Stamped across schema boundaries. See 0040."}
      - {name: superseded_by, type: string, required: false, description: "content_hash of the record that superseded this
          one. Present only on retired records (moved to store/v1/). Consumers HIDE any record carrying this. The source of
          truth for supersession; see 0040."}
      - {name: media, type: object, required: false, description: "Summary of extracted media stored at media/{record_hash}/.
          Currently {count, total_bytes}. Omitted when the record has no extracted media."}
      - {name: ai_usage, type: object, required: false, status: provisional, description: "PROVENANCE-ONLY record of AI processing
          that produced this record (model, version, token counts). No cost fields. Exact sub-field shape pending confirmation
          from the ingester workspace - emitted by the pipeline but not yet in record-format.md."}
      - {name: overlay_next_id, type: integer, required: false, description: "The next overlay-marker id to mint. Highlights,
          span notes, links AND the references between them share ONE per-record id space; this counter only ever increases,
          so no id the record has ever mentioned in any overlay construct is reissued - which keeps highlight context links
          and shareable (record-hash + id) link addresses from silently rebinding to a different span. It is not a decodable
          index (records may hold legacy or hand-written ids that are not counter renderings; the counter just refuses to
          collide with them). Written by the workbench, not the ingester. Absent on records with no overlay markers; when
          absent, derive the high-water from the largest id mentioned anywhere in the body (markers and references alike,
          since a dangling reference can be the only thing naming an id), clamped up to the authoring UI's minimum id - a
          fresh record starts at that minimum, not zero. See record-format.md."}
    sidecars:
      "sources/{content_hash}.peaks.json": "Waveform amplitude envelope of the archived original, audio/video only, schema
        anomalica/peaks/1. {schema, hex_hash, bins_per_second, duration, peaks}. `peaks` is one unsigned byte per bin, base64;
        each bin is the MAXIMUM absolute sample in its slice, never the average (an average flattens the onset the waveform
        exists to show). Reduction is single-sourced in anomalica-common/peaks.py - two components run it and a drift between
        them is silent. `duration` is DERIVED from the decoded audio and is the authoritative span for mapping the peaks:
        len(peaks)/duration == bins_per_second holds here and nowhere else. Do NOT map onto a player's duration (YouTube rounds
        to the whole second), a media element's (measures the container, not the decode), or the record's frontmatter `duration`
        (the FILE's length - a different quantity). ACCESS: peaks follow the TRANSCRIPT's allow-list, not the archived original's
        - open for public_domain, open_licence AND publicly_accessible, so a copyrighted source's audio stays gated while
        its envelope is served openly (Mark's ruling 2026-07-17; an envelope is a weaker derivative than the transcript, which
        is already public for those). The two allow-lists MUST NOT be collapsed: merging withdraws the ruling or leaks the
        audio. Route per object kind, never once per record. Everything else - licensed, restricted, unknown, absent - fails
        closed."

  per_model_digest:
    schema: anomalica/digest/1
    status: stable
    serialisation: YAML
    spec_doc: architecture/digest-format.md
    summary: One model's extraction of a source - a full set of nodes + claims. One per model, several per source (1..N models);
      these are the candidates the digest selector chooses from.
    fields:  # top-level metadata ("header"); the body is nodes + claims (see body)
      - {name: schema, type: string, required: true, description: "`anomalica/digest/1`."}
      - {name: extracted_at, type: string, required: true, description: "ISO 8601 timestamp of the extraction run."}
      - {name: model, type: string, required: true, description: "The model that produced this digest (digest/2 carries the
          versioned id)."}
      - {name: ai_usage, type: list, required: false, status: provisional, description: "Per-stage AI-processing provenance
          carried forward onto this digest (model, token counts). Data kept, not publicly surfaced."}
      - {name: prompts, type: list, required: false, description: "Which prompt produced each pass, so the digest is attributable
          to an exact prompt (mirrors 0010-auditable-assembly). One entry per pass: {pass, id, version, sha256, file}. An
          override is recorded as version 'override' with the file's own hash. Absent on pre-stamping digests."}
      - {name: pre_digest, type: object, required: false, description: "Content hash of the pre-digest - the ingest after
          deterministic model-prep (irrelevant removed, footnotes inlined, timestamps stripped), the exact model input (0042).
          {sha256, prep_version}. With prompts + model, reproduces the digest exactly. Absent on pre-0042 digests."}
      - {name: record, type: object, required: true, description: "The source record: {id (graph UUID, the join key against
          ingests), title, producer, date, reference}. Same value across every per-model digest of one source - the constant
          the source-trace rides on."}
    body:
      nodes: "List of every node mentioned by any claim. Each: {id (UUID, fresh per digest), type (one of person, organisation,
        project, place, event, object, document, topic), name, metadata?}."
      domain_claims: "Claims routed to the knowledge graph. Each: {id, type (observation|testimony|hearsay|opinion|measurement|administrative),
        attestation (first_hand|second_hand|third_hand), speaker?, location_in_record (where in the SOURCE the claim came
        from - the trace), date? | date_range?, refs?, quote (verbatim SOURCE text), text}."
      infrastructure_claims: "Same shape as domain_claims, routed to the infrastructure graph. Omitted when empty."

  selected_digest:
    schema: anomalica/digest/2
    status: provisional
    serialisation: YAML
    spec_doc: decisions/0039-multi-model-digestion-canonical-reconciliation.md
    summary: The selected digest per source - the digest selector picks the single best per-model digest whole; it does not
      merge them. The only digest assimilated; always rebuildable by re-running the selection over the per-model digests.
    fields:
      - {name: schema, type: string, required: true, description: "`anomalica/digest/2`."}
      - {name: selected_at, type: string, required: true, description: "ISO 8601 timestamp of the selection run."}
      - {name: selected_from, type: list, required: true, description: "The per-model digests the selection chose among -
          each {model, version} (+ its source path/hash), the winner marked. The digest-level audit: which models' extractions
          were candidates and which was picked."}
      - {name: record, type: object, required: true, description: "The source record - same shape and same value as the per-model
          digests' (one source). The source-trace rides on this being constant across the per-model digests and the selected
          one."}
    body:
      nodes: "The winning per-model digest's nodes, unchanged - selection picks a whole digest, so nodes are never merged
        across models."
      domain_claims: "The winning per-model digest's claims, unchanged (quote + location_in_record into `record`). No cross-model
        merge: models on one source are alternatives, not corroboration, and the selector picks one whole digest rather than
        collapsing claims (0039 independence rule)."
      infrastructure_claims: "Same shape, routed to the infrastructure graph."

  brief:
    schema: anomalica/brief/1
    status: stable
    serialisation: YAML
    spec_doc: architecture/brief-format.md
    summary: The graph slice feeding ONE page - language-neutral, pre-prose; the writer's sole input (decision 0036).
    fields:  # top-level; the body is the ordered `claims` selection (see body)
      - {name: schema, type: string, required: true, description: "`anomalica/brief/1`."}
      - {name: brief_hash, type: string, required: true, description: "SHA-256 over the ordered [(claim_id, claim_hash)] plus
          the page identity. The brief's fingerprint - staleness diff unit, assembler freeze (built_from), and 0010 audit
          hash."}
      - {name: page, type: object, required: true, description: "The page this brief builds: {kind: entity, node_id, node_type,
          title, slug}. slug pre-resolved by the synthesiser."}
      - {name: generated, type: object, required: true, description: "{graph_version} - the knowledge-graph version the brief
          was generated from (0010's coarse stamp)."}
      - {name: related_nodes, type: list, required: false, description: "Nodes co-occurring with the page entity, ranked by
          shared-claim count; each carries its resolved slug for cross-links."}
    body:
      claims: "Ordered selection - the only facts the writer may use. Each: {claim_id, claim_hash, content, original_excerpt,
        claim_type, attestation?, speaker {node_id,title}, node_refs, date, date_end, location_in_record, evidence {score,
        independent_sources}, provenance {record_id, record_title, record_date, record_reference, content_hash, friendly_name}}."

  content:
    schema: null  # no schema identifier defined yet
    status: provisional
    serialisation: markdown + YAML frontmatter
    spec_doc: architecture/content-format.md
    summary: The assembler's output - one rendered article per language, consumed by the Hugo site. UNSETTLED - see warning.
    warning: >-
      Content's layout (flat `<slug>.<lang>.md` vs document-first directories) is an unratified decision (assembler.md flags
      its own layout section as out of date), and the audit-field shape is not settled. Only the fields both current docs
      agree on are listed; do not treat content as final until content-format.md is ratified and the assembler workspace confirms
      what it emits.
    fields:  # frontmatter is human-controlled; the assembler preserves it and writes only the body
      - {name: title, type: string, required: true, description: "Article/page title."}
      - {name: description, type: string, required: false, description: "Short description."}
      - {name: directives, type: list, required: false, description: "Article-level presentational instructions to the assembler
          (style/formatting/naming only - never factual). Also sourced from `_directives.yaml` folder hierarchy and per-article
          `<slug>.directives.yaml` sidecars."}
      - {name: metadata, type: object, required: false, description: "Optional metadata the assembler reads but does not modify.
          Sub-shape not yet specified."}
    open_questions:
      - "Layout: flat `<slug>.<lang>.md` (assembler.md) vs document-first `index.{lang}.md` directories (content-lifecycle.md)
        - unratified."
      - "Audit/provenance binding (built_from/brief_hash, article/body hash, prompt hash) - where it is carried for content
        (frontmatter is assembler-preserved; review.yaml/verification.yaml sidecars hold review/verification). Needs the assembler
        workspace to confirm what is emitted."
    sidecars:
      review.yaml: "Append-only human-review log. Each entry: {date, language, reviewer, body_hash (sha256 of the markdown
        body), comment}. Informational, never a publication gate."
      verification.yaml: "AI verification report (a different model checks every assertion traces to the graph). Informational,
        never a gate."

# The hash / identity chain, source -> published article. Follows one fact end to end.
chain:
  - stage: source asset
    detail: "Raw bytes (pdf/audio/video) or rendered page/EPUB (web/ebook), archived under sources/."
  - stage: ingest
    detail: >-
      content_hash names store/{content_hash}.md. For audio/video/pdf it hashes the SOURCE BYTES (stable across re-extraction;
      asset at sources/{content_hash}.{ext}). For web/ebook it hashes the EXTRACTED BODY, and source_hash separately names
      the raw asset at sources/{source_hash}.{ext}. (Per-type source-anchored vs body-anchored split is current behaviour,
      under reconciliation.)
  - stage: digest
    detail: >-
      One digest per record at digests/records/{friendly-name}.yaml, paired to the ingest by the shared friendly name ({date}-{source_type}-{slug}).
      record.id is the graph UUID join key.
  - stage: brief
    detail: >-
      Per page. Each selected claim carries provenance.content_hash + friendly_name, linking the claim back to its ingest.
      brief_hash fingerprints the whole selection.
  - stage: content (article)
    detail: >-
      Assembled from exactly one brief. 0010's audit binds the article to brief_hash (built_from) so an article is reconstructable
      to the precise graph slice it was built from. (Content-side binding location is provisional - see types.content.open_questions.)
