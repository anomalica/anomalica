  predigest:
    - note: "Decision 0042 - the materialised, inspectable model input; a read-only rendered tab in the workbench shows it
        beside the ingest, with the exact versioned prompt."
  archive:
    - note: "Private archive."
  workbench:
    - label: "View on GitHub"
      url: "https://github.com/anomalica/workbench"
    - note: "Private review tool - runs locally, not publicly deployed."
  digester:
    - label: "View on GitHub"
      url: "https://github.com/anomalica/digester"
  digests:
    - note: "Per-model digests (one file per model), kept as the rebuildable inputs the selected digest is chosen from."
  selector:
    - note: "Decision 0039 - multi-model digestion; the selector picks the single best per-model digest."
  selected:
    - note: "Public data - the selected per-record digest the knowledge graph is built from."
  assimilator:
    - label: "View on GitHub"
      url: "https://github.com/anomalica/assimilator"
  kg:
    - note: "Download coming - a dated, citable SQLite snapshot of the public graph, once the first reviewed dataset is ready."
  assembler:
    - label: "View on GitHub"
      url: "https://github.com/anomalica/assembler"
  content:
    - note: "Published as the articles on this site - read them here, not as raw files."
  site:
    - label: "View on GitHub"
