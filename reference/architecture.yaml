# Canonical source for the /architecture/ page details panel.
# Lives in the anomalica meta-repo (reference/architecture.yaml); the site mounts it.
# Each node's copy is data, not code: edit here, no template changes needed.
# The diagram topology is the sibling reference/pipeline.mmd.

nodes:
  raw:
    kind: "Input"
    zone: "source"
    desc: "The original source material in any format - PDF documents, audio, video, web pages, ebooks. Driven by the existing
      network of references, not external editorial picks."
    output: "Nothing - this is the input."
    contains: "Third-party material in whatever form it was published - documents, broadcasts, articles, testimony."
    copyright: "Follows the source: public-domain and openly-licensed material is free to share; copyrighted material is handled
      under copyright and not republished."
  ingester:
    kind: "Component (Python)"
    zone: "public"
    desc: "Converts raw sources into structured text records. Per-format handlers: PDF, web, audio/video (transcription via
      whisperx + speaker diarisation), ebook. Runs on the local graphics card."
    output: "One markdown + YAML record per source (to Ingests), plus the original file and the complete raw transcript (to
      sources/)."
    contains: "Just code - an open-source tool. The records it produces inherit the source's copyright, but the ingester itself
      is public."
    copyright: "PUBLIC - open-source code."
  ingests:
    kind: "Data store (private)"
    zone: "source"
    desc: "The records store. One markdown + YAML file per source, content-addressed by hash. This is the binding contract
      every downstream stage reads against."
    output: "Records, consumed by the digester and the workbench."
    contains: "The full source text of each record, so its copyright follows the source - a mix of public-domain and copyrighted
      material."
    copyright: "Follows the source. This store is kept private because it can hold copyrighted text we are not allowed to
      republish, with proof-of-possession gating in the workbench - a copyright constraint, not secrecy; public-domain material
      here is free to share."
  archive:
    kind: "Data store (sources/)"
    zone: "source"
    desc: "Durable archive of the original raw files plus the complete raw AI transcripts (full whisperx + pyannote output,
      confidences and all). Lets a record be re-rendered to a new format without re-running it on the graphics card."
    output: "Re-render source for the ingester; provenance of last resort."
    contains: "The original files + raw transcripts. Copyright follows the source."
    copyright: "Follows the source - kept where copyright requires it, the same constraint as the ingests. (Backup of this
      is an open operational task.)"
  workbench:
    kind: "Component (Svelte + FastAPI)"
    zone: "review"
    desc: "The human review app, and the hub that touches almost everything. A reviewer loads a record, checks it against
      the original source and the raw archive, corrects the record text, labels who is speaking, adds visual notes (what's
      on screen but not in the audio), corrects the digests, and marks which records are observed enough to digest."
    output: "Corrections committed back to both the records (ingests) and the digests as git commits; a 'digestible' signal
      and a visual-notes sidecar for the digester."
    contains: "Reviewer edits + observations; reads the source material to check records against it."
    copyright: "PUBLIC tool. It reads source material that may be copyrighted but never exposes it publicly - what it publishes
      back are the corrections, not the source."
  digester:
    kind: "Component (Python)"
    zone: "public"
    desc: "AI reads each record and extracts the atomic factual claims and the entities (nodes) they involve, with provenance
      - who said it, where, attestation level. Defaults to the Claude subscription."
    output: "One per-record digest file (YAML) of nodes + claims."
    contains: "Structured facts with provenance - no copyrighted text, just claims traceable to a source."
    copyright: "Its output (digests) is public."
  fuser:
    kind: "Component (Python, planned)"
    zone: "public"
    desc: "Planned (decision 0039). When one source is digested by several models, the fuser builds ONE fused digest from the
      raw per-model digests: a model clusters the same fact across them, keeps the best phrasing, and - diffing the previous
      fused digest against the new one - records what was superseded, added, or deleted. It judges meaning, not text hashes or
      raw locations (both drift when a record is edited in the workbench). Today the digester writes one digest straight to
      Digests, so the fuser is a 1-model pass-through."
    output: "One fused digest per source - the only one assimilated; the raw per-model digests are kept as the rebuildable inputs."
    contains: "The fusion + supersession logic. Facts with provenance, no copyrighted text."
    copyright: "Its output (the fused digest) is public."
  digests:
    kind: "Data store (public)"
    zone: "public"
    desc: "Per-record digest files: the nodes and claims extracted from one source. This is the source of truth for the knowledge
      graph - the graph is rebuildable from these."
    output: "The input to the assimilator, and one input to the assembler."
    contains: "Facts and claims with provenance, per record - not source text."
    copyright: "PUBLIC - facts and claims aren't copyrightable, so everything from the digests onward is public."
  assimilator:
    kind: "Component (Python)"
    zone: "public"
    desc: "Sits beside the knowledge graph and maintains it: reads the current graph plus the new digest files, resolves the
      same real-world entity named across many records into a single node, accumulates every claim about it, computes corroboration
      (independent sources agreeing) and evidence scores, and writes the updated graph back. Incremental - seeded once, grown
      each run. This is where the project's differentiator lives."
    output: "Reads and writes the SQLite knowledge graph - maintains it incrementally."
    contains: "The integration logic - import, entity matching, scoring, corroboration, embeddings and search - now its own
      component, split out of the digester. Shares the digest format and the Claude transport with the digester via the anomalica-common
      library."
    copyright: "Its output (the graph) is public."
  kg:
    kind: "Data artefact (SQLite)"
    zone: "public"
    desc: "The unified, queryable knowledge graph: one node per real-world entity, all claims about it from across every source,
      corroboration links and evidence scores. The downloadable, torrentable public dataset and the source for every rendered
      output. Derived - rebuildable from the digests."
    output: "Read by the synthesiser when it chooses which pages to build."
    contains: "Entities, claims, provenance, scores. No copyrighted content."
    copyright: "PUBLIC - the data is meant to outlive the platform."
  synthesiser:
    kind: "Component (Python)"
    zone: "public"
    desc: "Reads the knowledge graph and decides which subjects now have enough corroborated information, across enough independent
      sources, to deserve a page. For each, it gathers exactly the facts that page needs into a 'brief' - a complete, language-neutral
      bundle of claims with their provenance. The choosing is deterministic; no prose is written here."
    output: "One brief per page - the slice of the graph that page is written from."
    contains: "The selection logic and the briefs: facts and claims with provenance, no copyrighted text."
    copyright: "PUBLIC - briefs are facts and claims, not source text."
  briefs:
    kind: "Data store (public)"
    zone: "public"
    desc: "One language-neutral brief per page: the exact slice of the knowledge graph a page is built from, before any prose.
      Its input hash is what tells the system when a page has gone out of date and needs rebuilding."
    output: "The assembler's only input when it writes an article. A per-record inspection page - a read-only page showing
      exactly what was pulled from one single source - comes straight from a digest instead, not from a brief."
    contains: "Selected claims with provenance and relationships. No copyrighted text."
    copyright: "PUBLIC."
  assembler:
    kind: "Component (Python)"
    zone: "public"
    desc: "Two kinds of page. For an entity article it reads one brief from the synthesiser and writes the prose from that
      alone - it never reads the knowledge graph directly. For a per-record inspection page - a read-only page showing exactly
      what was pulled from one single source - it reads a single digest. It assembles only from sourced claims, never adds
      facts from training data, and never generates imagery. Defaults to the Claude subscription."
    output: "Entity articles (from a brief) + per-record inspection pages (from a single digest), both to Content."
    contains: "Assembled prose, every sentence traceable to a claim and its source."
    copyright: "Its output is public."
  content:
    kind: "Data store (public)"
    zone: "public"
    desc: "The rendered articles plus their media. Each entity article and per-record inspection page, with live deep-links
      back to the exact source."
    output: "Consumed by the site."
    contains: "Assembled articles + media. No copyrighted source text."
    copyright: "PUBLIC."
  site:
    kind: "Component (Hugo + Tailwind)"
    zone: "public"
    desc: "The Hugo static site that renders the content to public HTML, in up to 30 displayed languages. Templates and styling
      only - it holds no content itself."
    output: "The public website."
    contains: "Static HTML, the design system."
    copyright: "PUBLIC."
  brand:
    kind: "Shared assets"
    zone: "store"
    desc: "The shared visual identity - triangle logo, deep-teal palette, Outfit + Noto Sans typography, design tokens - consumed
      by the site and the workbench. (These very colours are the brand palette.)"
    output: "Logo, palette, tokens."
    contains: "Design assets."
    copyright: "PUBLIC."

