  digester:
    - label: "View on GitHub"
      url: "https://github.com/anomalica/digester"
  fuser:
    - note: "Planned - decision 0039 (multi-model digestion and canonical reconciliation). Not yet built."
  digests:
    - note: "Public data - the per-record facts the knowledge graph is built from."
  assimilator:
    - label: "View on GitHub"
      url: "https://github.com/anomalica/assimilator"
  kg:
    - note: "Download coming - a dated, citable SQLite snapshot of the public graph, once the first reviewed dataset is ready."
  assembler:
    - label: "View on GitHub"
      url: "https://github.com/anomalica/assembler"
